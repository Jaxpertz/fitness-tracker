<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal Pro: Jack's Mission Control</title>
    <style>
        :root {
            --bg: #0d0d0d; --sidebar: #151515; --card: #1c1c1c; --text: #efefef; --accent: #00e676;
            --day1: #2196f3; --day2: #ff9800; --rest: #444; --border: #2a2a2a;
        }
        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        aside { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 15px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }

        /* Calendar Styling */
        .cal-feature { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.8em; font-weight: bold; }
        .cal-nav button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.2em; padding: 0 5px; }
        .mini-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 0.7em; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 2px; cursor: pointer; border: 1px solid transparent; }
        .cal-label { text-align: center; color: #555; font-weight: bold; }
        .type-1 { background: var(--day1); color: white; }
        .type-2 { background: var(--day2); color: white; }
        .type-rest { background: var(--rest); color: #999; }
        .today { outline: 1px solid white; font-weight: bold; }
        .selected-day { border-color: var(--accent); background: #333 !important; color: var(--accent) !important; }

        /* Interface */
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: var(--card); border: 1px solid var(--border); color: #888; padding: 10px 20px; cursor: pointer; border-radius: 6px; font-weight: bold; flex: 1; }
        .nav-btn.active { background: var(--accent); color: #000; border: none; }

        .section-card { background: var(--card); border-radius: 10px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .header-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { background: #000; padding: 10px; border-radius: 5px; border: 1px solid var(--border); text-align: center; flex: 1; min-width: 80px; }
        .stat-label { font-size: 0.6em; text-transform: uppercase; color: #888; display: block; }
        .stat-val { font-size: 1em; font-weight: bold; color: var(--accent); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.7em; color: #666; text-transform: uppercase; padding: 8px; }
        td { padding: 4px; border-bottom: 1px solid #222; }
        
        input { background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; width: 100%; font-size: 0.9em; }
        input:focus { border-color: var(--accent); outline: none; }
        .num-in { color: var(--accent); text-align: center; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; }
            aside { width: 100%; height: auto; border-right: none; }
            main { height: auto; }
        }
    </style>
</head>
<body>

<aside>
    <h3 style="margin:0; font-size:0.9em; color:var(--accent);">JACK'S MISSION CONTROL</h3>
    
    <div class="cal-feature">
        <div class="cal-nav">
            <span>TRAINING CYCLE</span>
            <div>
                <button onclick="changeMonth('train', -1)">&lsaquo;</button>
                <span id="trainMonthLabel"></span>
                <button onclick="changeMonth('train', 1)">&rsaquo;</button>
            </div>
        </div>
        <div class="mini-cal" id="trainCal"></div>
    </div>

    <div class="cal-feature">
        <div class="cal-nav">
            <span>DIET HISTORY</span>
            <div>
                <button onclick="changeMonth('diet', -1)">&lsaquo;</button>
                <span id="dietMonthLabel"></span>
                <button onclick="changeMonth('diet', 1)">&rsaquo;</button>
            </div>
        </div>
        <div class="mini-cal" id="dietCal"></div>
    </div>

    <div style="font-size:0.7em; color:#666; line-height:1.4;">
        *Click Diet History to switch spreadsheet date.<br>
        *Training shows rolling 1,2,R cycle.
    </div>
</aside>

<main>
    <div class="nav">
        <button class="nav-btn active" id="btn-training" onclick="toggleView('training')">Training Log</button>
        <button class="nav-btn" id="btn-diet" onclick="toggleView('diet')">Diet Spreadsheet</button>
    </div>

    <div id="trainingView" class="tab-content">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:20px;">
            <div class="section-card" style="border-top: 4px solid var(--day1);">
                <h3 style="margin:0 0 15px 0;">Upper Body</h3>
                <table id="upperTable">
                    <tr><th>Exercise</th><th>Scheme</th><th style="width:80px;">Weight</th></tr>
                </table>
            </div>
            <div class="section-card" style="border-top: 4px solid var(--day2);">
                <h3 style="margin:0 0 15px 0;">Lower Body</h3>
                <table id="lowerTable">
                    <tr><th>Exercise</th><th>Scheme</th><th style="width:80px;">Weight</th></tr>
                </table>
            </div>
        </div>
    </div>

    <div id="dietView" class="tab-content" style="display:none;">
        <div class="header-row">
            <div class="stat-box">
                <span class="stat-label">Daily Weight</span>
                <input type="text" id="bodyWeight" class="num-in" style="border:none; font-size:1.1em;" oninput="saveAll()">
            </div>
            <div class="stat-box"><span class="stat-label">Cals</span><span class="stat-val" id="totalCals">0</span></div>
            <div class="stat-box"><span class="stat-label">Prot</span><span class="stat-val" id="totalProt">0</span></div>
            <div class="stat-box"><span class="stat-label">Carb</span><span class="stat-val" id="totalCarb">0</span></div>
            <div class="stat-box"><span class="stat-label">Fat</span><span class="stat-val" id="totalFat">0</span></div>
            <div style="flex:1; text-align:right; font-weight:bold; color:var(--accent);" id="activeLogDateDisplay"></div>
        </div>
        <div id="mealSpreadsheet"></div>
    </div>
</main>

<script>
    const cycleStart = new Date(2026, 3, 1); // Anchor: April 1, 2026
    let selectedDate = new Date();
    let trainViewMonth = new Date();
    let dietViewMonth = new Date();

    const exercises = {
        upper: [
            ["Hammer Chest Press", "3 x 8-10"], ["Hammer Row", "3 x 10-12"], ["Lat Pulldown", "3 x 10-12"],
            ["Cable Lat Raise", "3 x 15-20"], ["Face Pulls", "3 x 15-20"], ["Tricep Pushdown", "3 x 12-15"], ["Incline DB Curls", "3 x 10-12"]
        ],
        lower: [
            ["Goblet Squat", "3 x 10-12"], ["Bulgarian Split Squat", "3 x 8-10"], ["Dumbbell RDL", "3 x 10-12"],
            ["Leg Extensions", "4 x 12-15"], ["Seated Leg Curls", "4 x 12-15"], ["Calf Raises", "4 x 15-20"]
        ]
    };

    function init() {
        renderCalendar('train');
        renderCalendar('diet');
        renderTrainingTables();
        renderDietSpreadsheet();
        loadAll();
    }

    function toggleView(view) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(view + 'View').style.display = 'block';
        document.getElementById('btn-' + view).classList.add('active');
    }

    function renderCalendar(type) {
        const grid = document.getElementById(type + 'Cal');
        const label = document.getElementById(type + 'MonthLabel');
        const dateObj = type === 'train' ? trainViewMonth : dietViewMonth;
        
        label.innerText = dateObj.toLocaleString('default', { month: 'short', year: '2-digit' });
        grid.innerHTML = '';
        ['S','M','T','W','T','F','S'].forEach(l => grid.innerHTML += `<div class="cal-label">${l}</div>`);
        
        const firstDay = new Date(dateObj.getFullYear(), dateObj.getMonth(), 1).getDay();
        const daysInMonth = new Date(dateObj.getFullYear(), dateObj.getMonth() + 1, 0).getDate();
        
        for(let i=0; i<firstDay; i++) grid.innerHTML += '<div></div>';

        for(let d=1; d<=daysInMonth; d++) {
            const date = new Date(dateObj.getFullYear(), dateObj.getMonth(), d);
            const diffDays = Math.floor((date - cycleStart) / 86400000);
            const cycle = ((diffDays % 3) + 3) % 3;
            
            const typeClass = cycle === 0 ? 'type-1' : (cycle === 1 ? 'type-2' : 'type-rest');
            const isToday = date.toDateString() === new Date().toDateString() ? 'today' : '';
            const isSelected = date.toDateString() === selectedDate.toDateString() ? 'selected-day' : '';
            
            const clickAction = type === 'diet' ? `onclick="selectDate('${date.toDateString()}')"` : '';
            grid.innerHTML += `<div class="cal-day ${typeClass} ${isToday} ${isSelected}" ${clickAction}>${d}</div>`;
        }
    }

    function changeMonth(type, dir) {
        const dateObj = type === 'train' ? trainViewMonth : dietViewMonth;
        dateObj.setMonth(dateObj.getMonth() + dir);
        renderCalendar(type);
    }

    function selectDate(dStr) {
        selectedDate = new Date(dStr);
        toggleView('diet');
        renderCalendar('diet');
        loadAll();
    }

    function renderTrainingTables() {
        ['upper', 'lower'].forEach(cat => {
            const table = document.getElementById(cat + 'Table');
            exercises[cat].forEach((ex, i) => {
                const row = table.insertRow();
                row.innerHTML = `<td>${ex[0]}</td><td style="font-size:0.8em; color:#888;">${ex[1]}</td><td><input type="text" class="num-in" id="ex_${cat}_${i}" oninput="saveAll()"></td>`;
            });
        });
    }

    function renderDietSpreadsheet() {
        const container = document.getElementById('mealSpreadsheet');
        container.innerHTML = '';
        ['Breakfast', 'Lunch', 'Dinner', 'Snacks'].forEach(meal => {
            let html = `<div class="section-card"><h4>${meal}</h4><table><tr><th>Food/Item</th><th style="width:70px">Cals</th><th style="width:70px">P</th><th style="width:70px">C</th><th style="width:70px">F</th></tr>`;
            for(let i=0; i<8; i++) {
                html += `<tr>
                    <td><input type="text" id="f_${meal}_${i}_n" oninput="saveAll()"></td>
                    <td><input type="text" class="num-in" id="f_${meal}_${i}_cal" oninput="saveAll()"></td>
                    <td><input type="text" class="num-in" id="f_${meal}_${i}_p" oninput="saveAll()"></td>
                    <td><input type="text" class="num-in" id="f_${meal}_${i}_c" oninput="saveAll()"></td>
                    <td><input type="text" class="num-in" id="f_${meal}_${i}_f" oninput="saveAll()"></td>
                </tr>`;
            }
            container.innerHTML += html + `</table></div>`;
        });
    }

    function saveAll() {
        const key = selectedDate.toDateString();
        const db = JSON.parse(localStorage.getItem('jack_pro_db_v2') || '{}');
        const dayData = { weight: document.getElementById('bodyWeight').value, training: {}, diet: {} };
        
        document.querySelectorAll('#trainingView input').forEach(i => dayData.training[i.id] = i.value);
        document.querySelectorAll('#mealSpreadsheet input').forEach(i => dayData.diet[i.id] = i.value);
        
        db[key] = dayData;
        localStorage.setItem('jack_pro_db_v2', JSON.stringify(db));
        calculate();
    }

    function loadAll() {
        const key = selectedDate.toDateString();
        document.getElementById('activeLogDateDisplay').innerText = key;
        const db = JSON.parse(localStorage.getItem('jack_pro_db_v2') || '{}');
        const data = db[key] || { weight: '', training: {}, diet: {} };

        document.getElementById('bodyWeight').value = data.weight || '';
        document.querySelectorAll('#trainingView input').forEach(i => i.value = data.training[i.id] || '');
        document.querySelectorAll('#mealSpreadsheet input').forEach(i => i.value = data.diet[i.id] || '');
        calculate();
    }

    function calculate() {
        let tC = 0, tP = 0, tCb = 0, tF = 0;
        document.querySelectorAll('#mealSpreadsheet input').forEach(i => {
            const val = parseFloat(i.value) || 0;
            if(i.id.includes('_cal')) tC += val;
            if(i.id.includes('_p')) tP += val;
            if(i.id.includes('_c')) tCb += val;
            if(i.id.includes('_f')) tF += val;
        });
        document.getElementById('totalCals').innerText = Math.round(tC);
        document.getElementById('totalProt').innerText = Math.round(tP);
        document.getElementById('totalCarb').innerText = Math.round(tCb);
        document.getElementById('totalFat').innerText = Math.round(tF);
        document.getElementById('totalProt').style.color = tP >= 155 ? 'var(--accent)' : '#ff5252';
    }

    init();
</script>
</body>
</html>
